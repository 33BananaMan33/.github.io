<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记整理助手</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 20px;
        }

        .instructions {
            background-color: #eff6ff;
            border-left: 4px solid var(--primary-color);
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #1e3a8a;
        }

        .instructions ul {
            margin: 8px 0 0 0;
            padding-left: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .chat-area {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            background-color: #f9fafb;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        button.outline {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.outline:hover {
            background-color: #f3f4f6;
        }

        .loading {
            display: none;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            padding: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e5e7eb;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background-color: #fef2f2;
            color: var(--error-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fca5a5;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 学习笔记整理助手</h1>

    <div class="instructions">
        <strong>使用说明：</strong>
        <ul>
            <li><strong>配置 API Key：</strong>请在下方填入您的阿里云百炼 API Key（直接存在您的浏览器内存中，刷新页面会清空，绝对安全）。</li>
            <li><strong>生成整理笔记：</strong>在底部输入框粘贴您的课程笔记文本，点击“发送”，模型会自动提取<strong>摘要、知识点、复习问题</strong>。</li>
            <li><strong>多轮修改：</strong>您可以在当前对话中继续下达指令，例如：“帮我把知识点改成表格”、“更简短一点”、“补充一些重点考题”等，系统将基于上文进行修改。</li>
        </ul>
    </div>

    <div class="card">
        <div class="form-group" style="margin-bottom: 0;">
            <label for="apiKey">阿里云百炼 API Key：</label>
            <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
        </div>
    </div>

    <div class="card">
        <div id="errorDisplay" class="error-message"></div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">你好！我是你的学习笔记整理助手。请在下方输入你的课程笔记，我将为你生成摘要、知识点和复习问题。</div>
        </div>

        <div id="loadingIndicator" class="loading">
            <span class="spinner"></span>模型正在思考，请稍候...
        </div>

        <div class="form-group">
            <textarea id="userInput" placeholder="在此处粘贴课程笔记，或者输入修改建议（如：将知识点整理成表格形式）..."></textarea>
        </div>

        <div class="actions">
            <button class="outline" id="clearBtn">清空对话</button>
            <button id="sendBtn">发 送</button>
        </div>
    </div>
</div>

<script>
    // 系统设定 Prompt，指导模型第一次和后续的表现
    const SYSTEM_PROMPT = `你是一个专业的学习笔记整理助手。
当用户首次输入一段课程笔记时，请你为其生成结构清晰的三部分内容：
1. 摘要；
2. 核心知识点；
3. 复习问题。
当用户在后续多轮对话中提出修改建议（例如“更简短”、“更适合考试复习”、“改成表格”等）时，请务必结合历史上下文对内容进行重新组织和修改输出。`;

    // 存储对话历史，用于多轮对话上下文
    let chatHistory = [];

    // DOM 元素获取
    const apiKeyInput = document.getElementById('apiKey');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chatArea = document.getElementById('chatArea');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const errorDisplay = document.getElementById('errorDisplay');

    // 显示错误信息
    function showError(msg) {
        if (msg) {
            errorDisplay.textContent = msg;
            errorDisplay.style.display = 'block';
        } else {
            errorDisplay.style.display = 'none';
        }
    }

    // 在页面渲染单条消息
    function appendMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.textContent = content;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight; // 滚动到底部
    }

    // 清除对话历史
    clearBtn.addEventListener('click', () => {
        chatHistory = [];
        chatArea.innerHTML = '<div class="message assistant">对话已清空。请重新输入您的笔记。</div>';
        userInput.value = '';
        showError('');
    });

    // 发送请求主逻辑
    sendBtn.addEventListener('click', async () => {
        const key = apiKeyInput.value.trim();
        const text = userInput.value.trim();

        if (!key) {
            showError('请先填写阿里云百炼 API Key。');
            apiKeyInput.focus();
            return;
        }

        if (!text) {
            showError('请输入笔记内容或修改建议。');
            userInput.focus();
            return;
        }

        showError('');
        
        // 1. 将用户的消息上屏并存入历史记录
        appendMessage('user', text);
        chatHistory.push({ role: 'user', content: text });
        userInput.value = '';

        // 2. 锁定 UI，显示加载中
        sendBtn.disabled = true;
        clearBtn.disabled = true;
        userInput.disabled = true;
        loadingIndicator.style.display = 'block';

        // 3. 构建 API 请求体
        // 需附带系统提示词和所有的历史记录，以实现多轮对话
        const requestBody = {
            model: "qwen3.6-plus",
            messages: [
                { role: "system", content: SYSTEM_PROMPT },
                ...chatHistory
            ]
        };

        try {
            // 4. 发送请求到阿里云兼容接口
            const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP 错误: 状态码 ${response.status}`);
            }

            const data = await response.json();
            const assistantReply = data.choices[0].message.content;

            // 5. 模型回复上屏并存入历史记录
            appendMessage('assistant', assistantReply);
            chatHistory.push({ role: 'assistant', content: assistantReply });

        } catch (error) {
            showError(`请求失败：${error.message}`);
            // 如果请求失败，将最后一条用户消息弹出历史，允许用户重试
            chatHistory.pop();
        } finally {
            // 6. 解锁 UI
            sendBtn.disabled = false;
            clearBtn.disabled = false;
            userInput.disabled = false;
            loadingIndicator.style.display = 'none';
            userInput.focus();
        }
    });

    // 支持回车发送（Shift + Enter 换行）
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
</script>
</body>
</html>
